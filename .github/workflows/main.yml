name: Build Unsigned IPA

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-26

    steps:
      # ── 1. 选定 Xcode 26.3（正式版，非 RC）────────────────────
      - name: Select Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      # ── 2. 确认版本 ────────────────────────────────────────────
      - name: Show versions
        run: |
          xcodebuild -version
          swift --version

      # ── 3. 检出代码（含子模块）──────────────────────────────────
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── 4. 安装 Rust 工具链 ────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92"
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      # ── 5. 缓存 Rust 编译产物 ──────────────────────────────────
      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            anki-bridge-rs/target
            anki-upstream/out
          key: ${{ runner.os }}-rust-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-

      # ── 6. 安装 Homebrew 依赖 ──────────────────────────────────
      - name: Install Homebrew dependencies
        run: |
          brew install protobuf swift-protobuf xcodegen

      # ── 7. 构建 Rust XCFramework ───────────────────────────────
      - name: Build Rust XCFramework
        run: |
          chmod +x ./scripts/build-xcframework.sh
          ./scripts/build-xcframework.sh

      # ── 8. 生成 Swift Protobuf 类型 ────────────────────────────
      - name: Generate Swift protobuf types
        run: |
          chmod +x ./scripts/generate-protos.sh
          ./scripts/generate-protos.sh

      # ── 9. 生成 Xcode 项目 ─────────────────────────────────────
      - name: Generate Xcode project
        run: |
          cd AnkiApp && xcodegen generate
          echo "=== Files in AnkiApp/ ==="
          ls -la ../AnkiApp/

      # ── 10. 构建无签名 xcarchive ───────────────────────────────
      # -skipPackagePluginValidation：允许 CI 中使用 Swift Macro（如 swift-dependencies
      #   的 DependenciesMacrosPlugin），跳过 Xcode 的交互式插件信任确认
      # -skipMacroValidation：同上，针对 Swift macro 本身的验证
      - name: Build unsigned xcarchive
        run: |
          xcodebuild archive \
            -project AnkiApp/AnkiApp.xcodeproj \
            -scheme AnkiApp \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/AnkiApp.xcarchive" \
            -sdk iphoneos \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -skipPackagePluginValidation \
            -skipMacroValidation

      # ── 11. 打包成 IPA ─────────────────────────────────────────
      - name: Package .app into unsigned .ipa
        run: |
          ARCHIVE_PATH="$RUNNER_TEMP/AnkiApp.xcarchive"

          echo "=== Archive contents ==="
          find "$ARCHIVE_PATH" -maxdepth 3 | head -30

          APP_PATH=$(find "$ARCHIVE_PATH/Products/Applications" -name "*.app" | head -1)
          echo "Found app: $APP_PATH"

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found in archive"
            exit 1
          fi

          mkdir -p /tmp/Payload
          cp -r "$APP_PATH" /tmp/Payload/

          cd /tmp
          zip -r AnkiApp-unsigned.ipa Payload

          echo "=== IPA created ==="
          ls -lh /tmp/AnkiApp-unsigned.ipa

      # ── 12. 上传为 Artifact ────────────────────────────────────
      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: AnkiApp-unsigned-ipa
          path: /tmp/AnkiApp-unsigned.ipa
          retention-days: 7
