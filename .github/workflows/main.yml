name: Build Unsigned IPA

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    # ✅ 核心修复：从 macos-15 换到 macos-26
    # macos-15 的 Xcode 16.4 只含 SPM 6.1.0，不满足项目要求的 6.2.0
    # macos-26 含更新的 Xcode，支持 Swift tools version 6.2.0
    runs-on: macos-26

    steps:
      # ── 1. 选定 Xcode 版本 ────────────────────────────────────
      # macos-26 runner 上可能装有多个 Xcode，明确选支持 Swift 6.2 的版本
      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # ── 2. 确认版本（调试用）──────────────────────────────────
      - name: Show Xcode and Swift version
        run: |
          xcodebuild -version
          swift --version

      # ── 3. 检出代码（含子模块）──────────────────────────────────
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── 4. 安装 Rust 工具链 ────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92"
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      # ── 5. 缓存 Rust 编译产物 ──────────────────────────────────
      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            anki-bridge-rs/target
            anki-upstream/out
          key: ${{ runner.os }}-rust-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-

      # ── 6. 安装 Homebrew 依赖 ──────────────────────────────────
      - name: Install Homebrew dependencies
        run: |
          brew install protobuf swift-protobuf xcodegen

      # ── 7. 构建 Rust XCFramework ───────────────────────────────
      - name: Build Rust XCFramework
        run: |
          chmod +x ./scripts/build-xcframework.sh
          ./scripts/build-xcframework.sh

      # ── 8. 生成 Swift Protobuf 类型 ────────────────────────────
      - name: Generate Swift protobuf types
        run: |
          chmod +x ./scripts/generate-protos.sh
          ./scripts/generate-protos.sh

      # ── 9. 生成 Xcode 项目 ─────────────────────────────────────
      - name: Generate Xcode project
        run: |
          cd AnkiApp && xcodegen generate
          echo "=== Files in AnkiApp/ ==="
          ls -la ../AnkiApp/

      # ── 10. 列出可用 Schemes ───────────────────────────────────
      - name: List available schemes
        run: |
          xcodebuild -project AnkiApp/AnkiApp.xcodeproj -list || true

      # ── 11. 构建无签名 xcarchive ───────────────────────────────
      - name: Build unsigned xcarchive
        run: |
          xcodebuild archive \
            -project AnkiApp/AnkiApp.xcodeproj \
            -scheme AnkiApp \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/AnkiApp.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # ── 12. 打包成 IPA ─────────────────────────────────────────
      - name: Package .app into unsigned .ipa
        run: |
          ARCHIVE_PATH="$RUNNER_TEMP/AnkiApp.xcarchive"

          echo "=== Archive contents ==="
          find "$ARCHIVE_PATH" -maxdepth 3 | head -30

          APP_PATH=$(find "$ARCHIVE_PATH/Products/Applications" -name "*.app" | head -1)
          echo "Found app: $APP_PATH"

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found in archive"
            exit 1
          fi

          mkdir -p /tmp/Payload
          cp -r "$APP_PATH" /tmp/Payload/

          cd /tmp
          zip -r AnkiApp-unsigned.ipa Payload

          echo "=== IPA created ==="
          ls -lh /tmp/AnkiApp-unsigned.ipa

      # ── 13. 上传为 Artifact ────────────────────────────────────
      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: AnkiApp-unsigned-ipa
          path: /tmp/AnkiApp-unsigned.ipa
          retention-days: 7
